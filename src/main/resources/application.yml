server:
  port: 8082

spring:
  application:
    name: lumen-decision-api

springdoc:
  swagger-ui:
    path: /docs
    operationsSorter: method
  api-docs:
    path: /api-docs

lumen:
  rate-limit:
    capacity: 100
    refill-tokens: 100
    refill-duration-hours: 1

logging:
  level:
    com.lumendecision: INFO
